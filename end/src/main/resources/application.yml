server:
  port: 8080

spring:
  application:
    name: metric-lab-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

metric:
  storage:
    root: ../metric-data
  large-model:
    enabled: ${LARGE_MODEL_ENABLED:false}
    provider: ${LARGE_MODEL_PROVIDER:doubao}
    base-url: ${LARGE_MODEL_BASE_URL:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    api-key: ${ARK_API_KEY:${LARGE_MODEL_API_KEY:}}
    model: ${ARK_MODEL:${LARGE_MODEL_MODEL:}}
    reasoning-effort: ${ARK_REASONING_EFFORT:${LARGE_MODEL_REASONING_EFFORT:medium}}
    max-completion-tokens: ${ARK_MAX_COMPLETION_TOKENS:${LARGE_MODEL_MAX_COMPLETION_TOKENS:4096}}
    timeout-seconds: ${LARGE_MODEL_TIMEOUT_SECONDS:60}
